<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Satisfação - Farmácia Tem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(135deg, rgba(46, 125, 50, 0.9), rgba(102, 187, 106, 0.9));
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      position: relative; overflow: hidden;
    }
    /* Marca d'água do Logotipo */
    body::before {
      content: "";
      position: absolute;
      width: 100%; height: 100%;
      background: url('logo.jpg') no-repeat center center;
      background-size: 300px;
      opacity: 0.15;
      z-index: -1;
    }
    .card {
      background: #fff; width: 90%; max-width: 420px; padding: 30px;
      border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; color: #2e7d32; margin-bottom: 10px; }
    p { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
    label { margin-top: 12px; display: block; font-weight: 600; color: #333; }
    input, select, textarea { width: 100%; margin-top: 6px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { width: 100%; margin-top: 20px; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #1b5e20; }
    .success { display: none; text-align: center; color: #2e7d32; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>
<div class="card">
  <h2>💊 Sua opinião importa</h2>
  <p>Farmácia Tem: Ajude-nos a melhorar</p>
  <form id="form">
    <label>Como foi o atendimento?</label>
    <select required><option value="">Selecione</option><option>Excelente</option><option>Bom</option><option>Regular</option><option>Ruim</option></select>
    <label>Encontrou o que precisava?</label>
    <select required><option value="">Selecione</option><option>Sim</option><option>Não</option></select>
    <label>O que você procurava?</label>
    <input type="text" placeholder="Ex: medicamentos, vitaminas...">
    <label>Voltaria a comprar conosco?</label>
    <select required><option value="">Selecione</option><option>Sim</option><option>Talvez</option><option>Não</option></select>
    <label>Sugestões</label>
    <textarea rows="3" placeholder="Deixe sua opinião..."></textarea>
    <button type="submit">Enviar avaliação</button>
  </form>
  <div class="success" id="msg">✅ Obrigado pela sua resposta!</div>
</div>
<script>
  document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("msg").style.display = "block";
    this.reset();
  });
</script>
</body>
</html>
